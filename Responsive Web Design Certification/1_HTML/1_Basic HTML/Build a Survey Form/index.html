<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="description" content="Inquiry for the Software Factory"/>
  <title>Talent Inquiry</title>
</head>
<body>
<main>
<h1 id="title">Talent Inquiry</h1>
<p id="description">Please fill out this form with full transparency.</p>
<form id="survey-form" method="post" action="https://register-demo.freecodecamp.org">
  <fieldset>
    <Legend>Basic Information</Legend>
    <label id="name-label" for="name">Name:</label>
      <input id="name" name="name" type="text" placeholder="e.g. Doe, John" size="30" required/>
    <br>
    <label id="email-label" for="email">Email:</label>
      <input id="email" name="email-label" type="email" placeholder="e.g. example@email.com" size="30" required/>
    <br>
    <label id="number-label" for="number">Age(optional):</label>
      <input id="number" name="number-label" type="number" placeholder="18" size="10" min="18" max="100" />
  </fieldset>
  <fieldset>
    <legend>Gender (required)</legend>
    <input id="male" value="male-gender" type="radio" name="gender" checked/>
    <label for="male">Male</label>
    <br>
    <input id="female" value="female-gender" type="radio" name="gender"/>
    <label for="female">Female</label>
  </fieldset>
  <fieldset>
    <legend>Amplifying Information</legend>
    <label for="dropdown">What is your current programming experience?</label>
      <select id="dropdown" name="experience">
        <option value="">(select one)</option>
        <option value="1">Beginner</option>
        <option value="2">Intermediate</option>
        <option value="3">Advanced</option>
        <option value="4">Expert</option>
      </select>
<hr>
    <label>Which of the following front-end languages do you know? (Select all that apply.) </label>
    <br>
    <input type="checkbox" id="HTML" value="HTML" name="front-end"/>
    <label for="HTML">HTML</label>
    <br>
    <input type="checkbox" id="CSS" value="CSS" name="front-end"/>
    <label for="CSS">CSS</label>
    <br>
    <input type="checkbox" id="javascript" value="javascript" name="front-end"/>
    <label for="javascript">Javascript</label>
    <br>
    <input type="checkbox" id="typescript" value="typescript" name="front-end"/>
    <label for="typescript">Typescript</label>
    <br>
    <legend for="others">Others:</legend>
    <textarea id="others" name="others" rows="1" cols="20"></textarea>
<hr>
    <label for="reason">Why did you want to become a Software Developer?</label>
    <textarea id="reason" name="reason" rows="10" cols="50" placeholder="I wanted to be a software developer..."></textarea>
    <br>
    <input type="submit" id="submit"/>
  </fieldset>
</form>
</main>
</body>
</html>
