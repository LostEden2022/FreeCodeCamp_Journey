<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
      name="viewport"
      content="width=device-width initial-scale=1.0"
     />
    <title>Checkout Page</title>
</head>
<body>
  <main>
    <h1>Checkout</h1>
    <section>
      <h2>Your Cart</h2>
          <figure>
              <img
                src="https://cdn.freecodecamp.org/curriculum/labs/cube.jpg"
                alt="a small Rubic's cube "
                height="150"
                width="auto"
              />
              <figcaption>Rubric's Cube</figcaption>
              <figcaption>$5.99</figcaption>
          </figure>
    </section>
    <section>
      <form>
      <h2>Payment Information</h2>
      <label for="card-name">Cardholder's Name:<span aria-hidden="true">*</span></label>
        <input
            type="text"
            id="card-name"
            name="card-name"
            required
          />
      <br>
      <label for="card-number">Card Number:<span aria-hidden="true">*</span></label>
        <input
            type="text"
            id="card-number"
            name="card-number"
            required
            aria-describedby="card-number-help"
        />
        <p id="card-number-help">Please enter your 16-digit card number without spaces or dashes.</p>
        <label for="expiry-date">Expiration Date:<span aria-hidden="true">*</span></label>
          <input
            type="number"
            id="expiry-date"
            name="expiry-date"
            placeholder="mm/yyyy"
            required
        />
        <br>
        <label for="card-verification-value">CVV:<span aria-hidden="true">*</span></label>
          <input
            type="number"
            id="card-verification-value"
            name="card-verification-value"
            max="4"
            required
            aria-label="card-verification-value"
        />
        <br>
          <button type="button">Place Order</button>
      </form>
    </section>
  </main>
</body>
</html>
