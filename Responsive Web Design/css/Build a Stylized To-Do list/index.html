<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=scaled-width initial scale=1.0"/>
    <title>Styled To-Do List</title>
    <link rel="stylesheet" href="styles.css"/>
</head>
<body>
    <ul class="todo-list">My To Do List
        <li>
            <input type="checkbox" id="html"/>
            <label for="html">Study HTML</label>
            <ul class="sub-item">
                <li>
                <a class=sub-item-link" href="https://www.freecodecamp.org/learn/responsive-web-design-v9/" target="_blank">Basic HTML</a>
                </li>
                <li>
                    <a class=sub-item-link" href="https://www.freecodecamp.org/learn/responsive-web-design-v9/" target="_blank">Semantic HTML</a>
                </li>
            </ul>
        </li>
        <li>
            <input type="checkbox" id="css"/>
            <label for="css">Study CSS</label>
            <ul class="sub-item">
                <li>
                    <a class=sub-item-link" href="https://www.freecodecamp.org/learn/responsive-web-design-v9/" target="_blank">Basic CSS</a>
                </li>
                <li>
                    <a class=sub-item-link" href="https://www.freecodecamp.org/learn/responsive-web-design-v9/" target="_blank">Advanced CSS</a>
                </li>
            </ul>
        </li>
        <li>
            <input type="checkbox" id="js"/>
            <label for="js">Study Javascript</label>
            <ul class="sub-item">
                <li>
                    <a class=sub-item-link" href="https://www.freecodecamp.org/learn/responsive-web-design-v9/" target="_blank">Basic JS</a>
                </li>
                <li>
                    <a class=sub-item-link" href="https://www.freecodecamp.org/learn/responsive-web-design-v9/" target="_blank">Advanced JS</a>
                </li>
            </ul>
        </li>
        <li>
            <input type="checkbox" id="ts"/>
            <label for="ts">Study Typescript</label>
            <ul class="sub-item">
                <li>
                    <a class=sub-item-link" href="https://www.freecodecamp.org/learn/responsive-web-design-v9/" target="_blank">Basic TS</a>
                </li>
                <li>
                    <a class=sub-item-link" href="https://www.freecodecamp.org/learn/responsive-web-design-v9/" target="_blank">Advanced TS</a>
                </li>
            </ul>
        </li>
    </ul>

</body>
</html>
